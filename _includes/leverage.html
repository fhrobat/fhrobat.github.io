<style>
    #three-widget {
        position: relative;
        width: 100%;
        height: 500px; /* Puoi cambiare l'altezza come preferisci */
        /* Sfondo rimosso per renderlo trasparente e usare quello del sito */
        overflow: hidden;
        margin-top: 40px; 
        margin-bottom: 40px;
    }
    #three-widget canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
    }
    #three-ui-container {
        position: absolute; 
        bottom: 20px; 
        width: 100%; 
        text-align: center; 
        pointer-events: none;
    }
    #three-widget button {
        pointer-events: auto; 
        background-color: #1a1a25; 
        color: white; 
        border: 1px solid #444;
        padding: 10px 20px; 
        font-size: 14px; 
        border-radius: 8px; 
        cursor: pointer; 
        transition: 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }
    #three-widget button:hover { 
        background-color: #2a2a35; 
        border-color: #888; 
        transform: translateY(-2px); 
    }
</style>

<div id="three-widget">
    <div id="three-ui-container">
        <button id="btn-reroll">Regenerate</button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('three-widget');

    // --- 1. SETUP BASE ---
    const scene = new THREE.Scene();
    // Nebbia rimossa per evitare stacchi di colore con lo sfondo della pagina

    const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, -4.5, 3.5);
    camera.up.set(0, 0, 1); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true permette la trasparenza
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio); 
    renderer.outputColorSpace = THREE.SRGBColorSpace; 
    renderer.setClearColor(0x000000, 0); // Forza lo sfondo del canvas a essere trasparente
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0.5); 

    // --- Luci ---
    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(3, -5, 8);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 

    // --- 2. CREAZIONE GRIGLIA ---
    const N_grid = 130; 
    const v_min = -2.5, v_max = 2.5;
    const step = (v_max - v_min) / (N_grid - 1);
    const boxSize = step * 0.85;

    const geometry = new THREE.BoxGeometry(boxSize, boxSize, 1);
    geometry.translate(0, 0, 0.5); 
    
    const material = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const instancedMesh = new THREE.InstancedMesh(geometry, material, N_grid * N_grid);
    scene.add(instancedMesh);

    const gridData = [];
    let index = 0;
    const initMatrix = new THREE.Matrix4();
    
    for (let i = 0; i < N_grid; i++) {
        for (let j = 0; j < N_grid; j++) {
            const x = v_min + i * step;
            const y = v_min + j * step;
            gridData.push({
                x: x, y: y,
                targetZ: 0, currentZ: 0,
                targetScale: 0, currentScale: 0,
                targetColor: new THREE.Color(0x000000), 
                currentColor: new THREE.Color(0x000000)
            });
            initMatrix.makeTranslation(x, y, 0);
            initMatrix.scale(new THREE.Vector3(0, 0, 0));
            instancedMesh.setMatrixAt(index, initMatrix);
            instancedMesh.setColorAt(index, new THREE.Color(0x000000));
            index++;
        }
    }
    instancedMesh.instanceMatrix.needsUpdate = true;
    instancedMesh.instanceColor.needsUpdate = true;

    // --- 3. COLOR MAP (Turbo) ---
    function getTurboColor(t) {
        t = Math.max(0, Math.min(1, t));
        const color = new THREE.Color();
        color.setHSL(0.7 - t * 0.75, 1.0, 0.5); 
        return color;
    }

    // --- 4. LOGICA RBF ---
    function generateAmoebaAndRBF() {
        const num_harmonics = 6;
        const a = [], b = [];
        for (let i=0; i<num_harmonics; i++) {
            a.push((Math.random() - 0.5) * 0.6);
            b.push((Math.random() - 0.5) * 0.6);
        }

        function getAmoebaRadius(theta) {
            let r = 1.0;
            for (let i=1; i<=num_harmonics; i++) {
                r += a[i-1]*Math.cos(i*theta) + b[i-1]*Math.sin(i*theta);
            }
            return Math.abs(r) * 1.3; 
        }

        const validPoints = [];
        gridData.forEach(pt => {
            const theta = Math.atan2(pt.y, pt.x);
            const rho = Math.sqrt(pt.x*pt.x + pt.y*pt.y);
            const r_bound = getAmoebaRadius(theta);
            
            if (rho <= r_bound) {
                validPoints.push(pt);
                pt.targetScale = 1; 
            } else {
                pt.targetZ = 0; 
                pt.targetScale = 0; 
                pt.targetColor = new THREE.Color(0x000000); 
            }
        });

        const num_centers = 15; 
        const centers = [];
        for (let i=0; i<num_centers; i++) {
            const randPt = validPoints[Math.floor(Math.random() * validPoints.length)];
            centers.push({ x: randPt.x, y: randPt.y });
        }

        const gamma = 8.0; 
        
        let maxZ = 0;
        validPoints.forEach(pt => {
            let z = 0;
            for (let i=0; i<num_centers; i++) {
                const dx = pt.x - centers[i].x;
                const dy = pt.y - centers[i].y;
                z += Math.exp(-gamma * (dx*dx + dy*dy));
            }
            pt.targetZ = z;
            if (z > maxZ) maxZ = z;
        });

        validPoints.forEach(pt => {
            const normZ = pt.targetZ / (maxZ || 1);
            pt.targetZ = Math.max(0.02, normZ * 2.5); 
            if(pt.targetScale > 0) pt.targetColor = getTurboColor(normZ);
        });
    }

    generateAmoebaAndRBF();
    document.getElementById('btn-reroll').addEventListener('click', generateAmoebaAndRBF);

    // --- 5. ANIMAZIONE FLUIDA ---
    const dummyMatrix = new THREE.Matrix4();
    const dummyScale = new THREE.Vector3();

    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        for (let i = 0; i < gridData.length; i++) {
            const pt = gridData[i];
            
            pt.currentZ += (pt.targetZ - pt.currentZ) * 0.08;
            pt.currentScale += (pt.targetScale - pt.currentScale) * 0.08;
            pt.currentColor.lerp(pt.targetColor, 0.08);

            dummyMatrix.makeTranslation(pt.x, pt.y, 0); 
            
            if (pt.currentScale < 0.005 && pt.targetScale === 0) {
                dummyScale.set(0, 0, 0);
            } else {
                dummyScale.set(pt.currentScale, pt.currentScale, Math.max(0.0001, pt.currentZ));
            }
            
            dummyMatrix.scale(dummyScale);
            instancedMesh.setMatrixAt(i, dummyMatrix);
            instancedMesh.setColorAt(i, pt.currentColor);
        }
        
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.instanceColor.needsUpdate = true;
        
        scene.rotation.z -= 0.0005; 

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
</script>
