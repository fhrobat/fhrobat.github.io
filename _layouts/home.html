---
layout: default
---
<div id="page-loader" aria-hidden="false">
  <img
      src="loader.png"
      alt="Loading"
      class="loader-image no-reinvert"
    >
</div>

<div id="site-wrapper">
<header>
  <h1 id="name_title">{{ site.title }}</h1>
  {%-if site.theme_config.show_description-%}
    <p>{{ site.description }}</p>
  {%-endif-%}
</header>

{%-include menu_item.html collection=site.data.menu.entries-%}

{{ content }}

</div>

<footer class="minimal-footer">
  <p>Last updated: {{ site.time | date: "%B %d, %Y" }}</p>
  <p>Template by <a href="https://github.com/riggraz/no-style-please" target="_blank" rel="noopener noreferrer">no-style-please</a>.</p>
</footer>  

<button id="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle theme"> <span id="theme-icon">🌓</span> </button>
<script type="module" src="{{ '/assets/js/home.js' | relative_url }}"></script>
